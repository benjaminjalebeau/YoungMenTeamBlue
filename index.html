<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dino Game</title>
  <style>
    html, body { margin: 0; height: 100%; background: linear-gradient(180deg, #87ceeb 0%, #c8e6f5 60%, #f0f8ff 100%); display: flex; align-items: center; justify-content: center; font-family: monospace; }
    canvas { display: block; border: 3px solid #555; box-shadow: 0 8px 30px rgba(0,0,0,0.3); transform: scale(1.3); transform-origin: center; }
  </style>
</head>
<body>
<canvas id="c" width="800" height="300"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 300;
const GROUND = 230;

let state = 'idle'; // idle, running, dead
let score = 0, hiScore = 0, speed = 5, frame = 0, spawnTimer = 0;
let dino, cacti, birds, clouds;
let checkpoint = 0, flashTimer = 0, flashMsg = '';
let birdSpawnTimer = 0;

function initGame() {
  dino = { x: 80, y: GROUND, w: 44, h: 48, vy: 0, onGround: true, legFrame: 0, jumps: 0 };
  cacti = [];
  birds = [];
  birdSpawnTimer = 200;
  clouds = [{ x: 200, y: 60 }, { x: 500, y: 40 }, { x: 700, y: 75 }];
  score = 0;
  speed = 5;
  frame = 0;
  spawnTimer = 0;
  checkpoint = 0;
  flashTimer = 0;
  flashMsg = '';
}

function jump() {
  if (dino.jumps < 2) {
    dino.vy = -14;
    dino.onGround = false;
    dino.jumps++;
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (state === 'idle' || state === 'dead') { initGame(); state = 'running'; }
    else jump();
  }
  if (e.code === 'ArrowDown') { /* duck placeholder */ }
});

canvas.addEventListener('click', () => {
  if (state === 'idle' || state === 'dead') { initGame(); state = 'running'; }
  else jump();
});

// Draw fish character
function drawDino(d, dead) {
  const cx = d.x + 20, cy = d.y - 28; // body center
  const leg = Math.floor(frame / 6) % 2;

  // tail fin (left, triangular)
  ctx.fillStyle = '#1a7abf';
  ctx.beginPath();
  ctx.moveTo(cx - 18, cy);
  ctx.lineTo(cx - 34, cy - 14);
  ctx.lineTo(cx - 34, cy + 14);
  ctx.closePath();
  ctx.fill();

  // body
  ctx.fillStyle = '#2da0e0';
  ctx.beginPath();
  ctx.ellipse(cx, cy, 22, 15, 0, 0, Math.PI * 2);
  ctx.fill();

  // belly highlight
  ctx.fillStyle = '#a8dff5';
  ctx.beginPath();
  ctx.ellipse(cx + 4, cy + 4, 12, 7, 0.2, 0, Math.PI * 2);
  ctx.fill();

  // dorsal fin (top)
  ctx.fillStyle = '#1a7abf';
  ctx.beginPath();
  ctx.moveTo(cx - 8, cy - 15);
  ctx.lineTo(cx, cy - 28);
  ctx.lineTo(cx + 8, cy - 15);
  ctx.closePath();
  ctx.fill();

  // big eye (white)
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx + 14, cy - 4, 9, 0, Math.PI * 2);
  ctx.fill();
  // pupil
  ctx.fillStyle = dead ? '#f00' : '#111';
  ctx.beginPath();
  ctx.arc(cx + 15, cy - 4, 5, 0, Math.PI * 2);
  ctx.fill();
  // eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx + 17, cy - 7, 2, 0, Math.PI * 2);
  ctx.fill();

  // mouth
  ctx.fillStyle = '#1a5a80';
  ctx.beginPath();
  ctx.arc(cx + 22, cy + 3, 4, 0.2, Math.PI - 0.2);
  ctx.fill();

  // walking fins (bottom)
  ctx.fillStyle = '#1a7abf';
  if (d.onGround) {
    ctx.beginPath();
    ctx.ellipse(cx - 4, cy + 16, 5, leg === 0 ? 10 : 7, 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 9, cy + 16, 5, leg === 1 ? 10 : 7, -0.2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.ellipse(cx - 4, cy + 15, 5, 8, 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 9, cy + 15, 5, 8, -0.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawCactus(c) {
  ctx.fillStyle = '#3a8a3a';
  // main stem
  ctx.fillRect(c.x + 8, c.y - c.h, 14, c.h);
  // left arm
  ctx.fillRect(c.x, c.y - c.h + 14, 20, 10);
  ctx.fillRect(c.x, c.y - c.h + 4, 10, 14);
  // right arm
  ctx.fillRect(c.x + 8, c.y - c.h + 20, 22, 10);
  ctx.fillRect(c.x + 20, c.y - c.h + 10, 10, 14);
}

function drawBird(b) {
  const wingUp = Math.floor(frame / 10) % 2 === 0;
  ctx.fillStyle = '#774';
  // body
  ctx.fillRect(b.x + 8, b.y - 8, 20, 10);
  // head + beak
  ctx.fillRect(b.x + 24, b.y - 12, 12, 10);
  ctx.fillRect(b.x + 34, b.y - 9, 8, 4);
  // wings
  if (wingUp) {
    ctx.fillRect(b.x,      b.y - 18, 12, 8);
    ctx.fillRect(b.x + 16, b.y - 18, 12, 8);
  } else {
    ctx.fillRect(b.x,      b.y - 2,  12, 8);
    ctx.fillRect(b.x + 16, b.y - 2,  12, 8);
  }
}

function drawCloud(cl) {
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.ellipse(cl.x, cl.y, 40, 18, 0, 0, Math.PI * 2);
  ctx.ellipse(cl.x + 30, cl.y - 8, 28, 16, 0, 0, Math.PI * 2);
  ctx.ellipse(cl.x - 24, cl.y - 4, 24, 14, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawGround() {
  ctx.fillStyle = '#8B7355';
  ctx.fillRect(0, GROUND, W, 4);
  // pebbles
  ctx.fillStyle = '#a0916e';
  for (let i = 0; i < 20; i++) {
    const px = ((i * 83 + frame) % (W + 40)) - 20;
    ctx.fillRect(px, GROUND + 6, 6, 3);
  }
}

function checkHit() {
  for (const c of cacti) {
    if (dino.x + 8 < c.x + 28 && dino.x + 32 > c.x + 4 &&
        dino.y > c.y - c.h && dino.y - dino.h + 10 < c.y) {
      return true;
    }
  }
  // birds: hitbox is roughly 36x20 centered on b.x+18, b.y-4
  for (const b of birds) {
    if (dino.x + 8 < b.x + 36 && dino.x + 32 > b.x + 4 &&
        dino.y - dino.h + 10 < b.y + 6 && dino.y > b.y - 20) {
      return true;
    }
  }
  return false;
}

function update() {
  frame++;
  score++;

  // checkpoint every 100 display points
  const displayScore = Math.floor(score / 10);
  if (displayScore > 0 && displayScore % 100 === 0 && Math.floor(displayScore / 100) > checkpoint) {
    checkpoint = Math.floor(displayScore / 100);
    speed += 1;
    flashMsg = 'CHECKPOINT ' + checkpoint + '!  SPEED UP!';
    flashTimer = 120;
  }
  if (flashTimer > 0) flashTimer--;

  // dino physics
  dino.vy += 0.8;
  dino.y += dino.vy;
  if (dino.y >= GROUND) { dino.y = GROUND; dino.vy = 0; dino.onGround = true; dino.jumps = 0; }

  // clouds
  for (const cl of clouds) {
    cl.x -= 1;
    if (cl.x < -80) cl.x = W + 80;
  }

  // spawn cacti (1, 2, or 3 in a cluster)
  spawnTimer--;
  if (spawnTimer <= 0) {
    const count = Math.random() < 0.4 ? 1 : Math.random() < 0.6 ? 2 : 3;
    for (let i = 0; i < count; i++) {
      const h = 40 + Math.random() * 30;
      cacti.push({ x: W + 10 + i * 28, y: GROUND, h });
    }
    spawnTimer = 60 + Math.random() * 80;
  }

  // move cacti
  for (const c of cacti) c.x -= speed;
  cacti = cacti.filter(c => c.x > -60);

  // spawn birds (only after score 200 so player has time to learn)
  if (Math.floor(score / 10) >= 50) {
    birdSpawnTimer--;
    if (birdSpawnTimer <= 0) {
      // fly at mid-jump height (~100px above ground) so jumping into them kills you
      const baseY = GROUND - 90 - Math.random() * 40;
      birds.push({ x: W + 10, y: baseY, baseY, phase: Math.random() * Math.PI * 2 });
      birdSpawnTimer = 90 + Math.random() * 100;
    }
  }
  for (const b of birds) {
    b.x -= speed + 2;
    b.y = b.baseY + Math.sin(frame * 0.05 + b.phase) * 12;
  }
  birds = birds.filter(b => b.x > -60);

  if (checkHit()) {
    hiScore = Math.max(hiScore, Math.floor(score / 10));
    state = 'dead';
  }
}

function drawScore() {
  ctx.fillStyle = '#555';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('HI ' + String(hiScore).padStart(5, '0') + '  ' + String(Math.floor(score / 10)).padStart(5, '0'), W - 20, 30);
  ctx.textAlign = 'left';
}

function drawOverlay(msg) {
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(W/2 - 160, H/2 - 44, 320, 80);
  ctx.fillStyle = '#444';
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(msg, W/2, H/2 - 10);
  ctx.font = '14px monospace';
  ctx.fillText('SPACE / CLICK to ' + (state === 'dead' ? 'restart' : 'start'), W/2, H/2 + 20);
  ctx.textAlign = 'left';
}

function draw() {
  // sky gradient background
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#87ceeb');
  sky.addColorStop(0.75, '#d4edfa');
  sky.addColorStop(1, '#f5f0e8');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  for (const cl of clouds) drawCloud(cl);
  drawGround();
  for (const c of cacti) drawCactus(c);
  for (const b of birds) drawBird(b);
  drawDino(dino, state === 'dead');
  drawScore();

  if (flashTimer > 0 && state === 'running') {
    const alpha = Math.min(1, flashTimer / 30);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ff6600';
    ctx.font = 'bold 26px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(flashMsg, W / 2, 70);
    ctx.restore();
  }

  if (state === 'idle') drawOverlay('DINO RUN');
  if (state === 'dead') drawOverlay('GAME OVER');
}

function loop() {
  if (state === 'running') update();
  draw();
  requestAnimationFrame(loop);
}

initGame();
loop();
</script>
</body>
</html>
